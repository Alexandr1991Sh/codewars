<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>


    const array = [1, 2, 4, 7, 9, 3, 8, 6]

    let count = 0

    const linearSearch = (arr, num) => {
        for (let i = 0; i < arr.length; i++) {
            count += 1
            if (arr[i] === num) return i
        }
        return null
    }

    console.log(linearSearch(array, 2))
    console.log('count =', count)


</script>
</body>
</html>
