<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

    const strStr = function (haystack, needle) {
        return haystack.indexOf(needle)
    }

    console.log(strStr('sadbutsad', 'sad'))     // 0
    console.log(strStr('leetcode', 'leeto'))    // -1

</script>
</body>
</html>
