<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

    // Что будет выведено в консоль?
    let number = 0;

    const increment = () => {
        number += 1;
        const message = `Incremented to ${number}`;

        return () => {
            console.log(message);
            console.log(`Number: ${number}`);
        };
    };

    const log = increment();
    increment();
    increment();
    log();


</script>
