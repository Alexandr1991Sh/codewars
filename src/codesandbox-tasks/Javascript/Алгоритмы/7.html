<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

    // Результат - строка из сконкотенированных value элементов, расположенных в обратном порядке букв,
    // в порядке возрастания order, не содержит одинаковых букв, не содержит expired элементов

    const input = [
        {value: "abcd", order: 4, expired: false},
        {value: "qwer", order: 2, expired: true},
        {value: "xyz1", order: 1, expired: false},
        {value: "abx2", order: 3, expired: false},
    ];

    const getConcated = (arr) => {
        const sorted = arr.sort((a, b) => a.order - b.order)
        const str = sorted.reduce((acc, cur) => {
            if (!cur.expired) {
                const val = cur.value.split("").reverse().join("")
                acc += val
            }
            return acc
        }, '')
        return Array.from(new Set(str)).join("");
    }


    console.log(getConcated(input)); // 1zyx2badc


</script>
</body>
</html>
