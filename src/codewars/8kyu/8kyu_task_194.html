    function correct(str) {
        const replace = {'0': 'O', '1': 'I', '5': 'S'}
        return str.split('').map(el => replace[el]|| el).join('')
    }

    console.log(correct("L0ND0N"))  // LONDON
    console.log(correct("DUBL1N"))  // DUBLIN
    console.log(correct("PAR15"))  // "PARIS
