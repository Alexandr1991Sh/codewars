<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

    const plusOne = function (digits) {
        for (let i = digits.length - 1; i >= 0; i--) {
            if (digits[i] < 9) {
                digits[i]++
                return digits
            }
            digits[i] = 0
        }
        digits.unshift(1)
        return digits
    }

    console.log(plusOne([1, 2, 3]))             // [1,2,4]
    console.log(plusOne([4, 3, 2, 1]))          // [4,3,2,2]
    console.log(plusOne([9]))                   // [1,0]

</script>
</body>
</html>
