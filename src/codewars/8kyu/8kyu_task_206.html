<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

    const merge = function (nums1, m, nums2, n) {
        const numsResult = [...nums1, ...nums2].sort((a, b) => a - b).filter(el => el !== 0)
        if (numsResult.length > (n + m)) {
            numsResult.splice(n + m)
        }
        return numsResult
    };

    console.log(merge([1, 2, 3, 0, 0, 0], 3, [2, 5, 6], 3))      //  [1,2,2,3,5,6]
    console.log(merge([1, 2, 3, 0, 0, 0,1,2,31,3,1,], 3, [2, 5, 6], 3))
    console.log(merge([1], 1, [], 0))                            //  [1]

</script>
</body>
</html>
