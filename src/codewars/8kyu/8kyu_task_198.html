<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

    const isPalindrome = function (x) {
        return x === Number(x.toString().split('').reverse().join(''))
    };

    console.log(isPalindrome(121))  //true
    console.log(isPalindrome(-121))  //false
    console.log(isPalindrome(10))  //false

</script>
</body>
</html>
